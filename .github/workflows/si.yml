name: CI/CD DevOps

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar repo
      uses: actions/checkout@v3

    # 🐳 Login Docker
    - name: Login Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASS }}

    # 🐳 Build imagen
    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USER }}/hola-devops .

    # 🚀 Push a Docker Hub
    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USER }}/hola-devops

    # 🌍 Deploy en Render
    - name: Deploy to Render
      run: |
        curl -X POST https://api.render.com/v1/services/srv-d7m043e7r5hc73fu0940/deploys \
        -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"
